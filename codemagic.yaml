workflows:
  ios-unsigned-workflow:
    name: iOS Unsigned Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
    scripts:
      - name: CocoaPods installation
        script: | 
          cd $CM_BUILD_DIR
          pod install --repo-update || true
      - name: Building iOS App without Signing
        script: | 
          cd $CM_BUILD_DIR
          xcodebuild build -project "Unity-iPhone.xcodeproj" -scheme "Unity-iPhone" -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/Products/Release-iphoneos/*.app
